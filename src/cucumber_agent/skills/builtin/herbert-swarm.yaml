name: Herbert Swarm
command: /herbert-swarm
aliases:
  - /herbert
  - /herbert swarm
  - /swarm
description: >
  Native multi-agent project builder. Analyzes a SPEC.md, creates a phased task plan,
  and executes tasks in parallel using real sub-agents. Built into CucumberAgent — no external tools.
  Use this for: building full-stack apps, Docker setup, larger refactoring projects.
args_hint: "[Projekt] [--dry-run] [--parallel N] [--timeout SEKUNDEN]"
timeout: 1800
handler: herbert_swarm
steps:
  - Call swarm command "init" for the project path
  - Call swarm command "plan" to analyze SPEC.md and create task plan
  - Call swarm command "run" with parallel, timeout, dry_run, retry_failed settings
  - Call swarm command "report" for final summary
prompt: |
  You are running Herbert Swarm natively inside CucumberAgent.

  IMPORTANT: Use the `swarm` tool (from ToolRegistry). Do NOT use external Hermes,
  Claude Flow, npm, npx, git-based swarm commands, or shell scripts.

  The `swarm` tool is a native CucumberAgent tool that runs async sub-agents in parallel.

  Argument parsing from {args}:
  - First positional arg = project path (default: current working directory)
  - Flags: --dry-run, --parallel N, --timeout SECONDS

  Workflow — call swarm tool with these command+args:

  Step 1 — init:
    swarm(command="init", project="<abs_path>", name="<project_name>")

  Step 2 — plan:
    swarm(command="plan", project="<abs_path>", spec="<path_to_spec.md>")
    Note: If project has no SPEC.md or wrong stack (Vanilla JS, PHP, etc.),
    manually write tasks into brain JSON instead of relying on plan.

  Step 3 — run:
    swarm(command="run", project="<abs_path>", parallel=3, timeout=300, dry_run=false, retry_failed=false)

  Step 4 — report:
    swarm(command="report", project="<abs_path>")

  Return a concise German summary with: project path, task count, status, failed tasks guidance.
