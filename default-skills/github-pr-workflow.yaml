name: github-pr-workflow
command: /pr
description: GitHub Pull Request lifecycle â€” branch, commit, open PR, monitor CI,
  auto-fix, merge
args_hint: '[action] â€” z.B. ''create'' ''status'' ''merge'' oder ''fix'''
prompt: "GitHub PR Workflow â€” full PR lifecycle using gh CLI.\n\n## Prerequisites\n\
  - gh authenticated: `gh auth status`\n- Inside a git repo with GitHub remote\n\n\
  ## AUTH DETECTION\n```bash\nif command -v gh &>/dev/null && gh auth status &>/dev/null;\
  \ then\n  echo \"gh available\"\nelse\n  echo \"gh not available â€” use curl fallback\"\
  \nfi\n```\n\n## ACTIONS\n\n### /pr create [title] [body]\nCreate and push a new\
  \ branch + PR:\n```bash\n# 1. Branch from current HEAD\nBRANCH=$(git branch --show-current)\n\
  gh pr create \\\n  --title \"$TITLE\" \\\n  --body \"$BODY\" \\\n  --base main\n\
  ```\n\n### /pr status\nCheck CI status of current branch:\n```bash\ngh pr checks\n\
  gh pr checks --watch    # Poll until complete\n```\n\n### /pr fix\nAuto-fix CI failures:\n\
  1. `gh run list --branch $(git branch --show-current) --limit 5`\n2. `gh run view\
  \ <RUN_ID> --log-failed` â†’ get error\n3. Fix the code with patch tool\n4. `git add\
  \ . && git commit -m \"fix: ...\" && git push`\n5. `gh pr checks --watch`\n6. Repeat\
  \ up to 3x, then alert user\n\n### /pr merge\nSquash merge current PR:\n```bash\n\
  gh pr merge --squash --delete-branch\n# Or enable auto-merge (waits for CI):\ngh\
  \ pr merge --auto --squash --delete-branch\n```\n\n### /pr list\nList open PRs:\n\
  ```bash\ngh pr list --author @me\ngh pr list --state all\n```\n\n### /pr checkout\
  \ [N]\nCheck out someone's PR locally:\n```bash\ngh pr checkout N\n```\n\n## WORKFLOW\
  \ EXAMPLE\n```bash\n# 1. Start\ngit checkout main && git pull origin main\ngit checkout\
  \ -b fix/login-redirect\n\n# 2. Agent makes code changes\n\n# 3. Commit\ngit add\
  \ src/auth/login.py tests/test_login.py\ngit commit -m \"fix: preserve ?next= param\
  \ after login\"\n\n# 4. Push + PR\ngit push -u origin HEAD\ngh pr create --title\
  \ \"fix: preserve redirect param\" --body \"## Summary\\n...\" --base main\n\n#\
  \ 5. Monitor\ngh pr checks --watch\n\n# 6. Merge\ngh pr merge --squash --delete-branch\n\
  ```\n\n## CURL FALLBACK (no gh)\n```bash\nREMOTE_URL=$(git remote get-url origin)\n\
  OWNER_REPO=$(echo \"$REMOTE_URL\" | sed -E 's|.*github\\.com[:/]||; s|\\.git$||')\n\
  OWNER=$(echo \"$OWNER_REPO\" | cut -d/ -f1)\nREPO=$(echo \"$OWNER_REPO\" | cut -d/\
  \ -f2)\n\n# Create PR\ncurl -s -X POST \\\n  -H \"Authorization: token $GITHUB_TOKEN\"\
  \ \\\n  -H \"Accept: application/vnd.github.v3+json\" \\\n  https://api.github.com/repos/$OWNER/$REPO/pulls\
  \ \\\n  -d '{\"title\":\"...\",\"body\":\"...\",\"head\":\"BRANCH\",\"base\":\"\
  main\"}'\n```\n"
triggers:
- github pr
- pull request
- create pr
- merge pr
- pr erstellen
- pr merge
- new pr
- pr Ă¶ffnen
- pr close
- squash
- pr title
- pr description
- auto-merge
