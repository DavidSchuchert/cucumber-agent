name: github-pr-workflow
command: /pr
description: GitHub Pull Request lifecycle — branch, commit, open PR, monitor CI, auto-fix, merge
args_hint: "[action] — z.B. 'create' 'status' 'merge' oder 'fix'"
prompt: |
  GitHub PR Workflow — full PR lifecycle using gh CLI.

  ## Prerequisites
  - gh authenticated: `gh auth status`
  - Inside a git repo with GitHub remote

  ## AUTH DETECTION
  ```bash
  if command -v gh &>/dev/null && gh auth status &>/dev/null; then
    echo "gh available"
  else
    echo "gh not available — use curl fallback"
  fi
  ```

  ## ACTIONS

  ### /pr create [title] [body]
  Create and push a new branch + PR:
  ```bash
  # 1. Branch from current HEAD
  BRANCH=$(git branch --show-current)
  gh pr create \
    --title "$TITLE" \
    --body "$BODY" \
    --base main
  ```

  ### /pr status
  Check CI status of current branch:
  ```bash
  gh pr checks
  gh pr checks --watch    # Poll until complete
  ```

  ### /pr fix
  Auto-fix CI failures:
  1. `gh run list --branch $(git branch --show-current) --limit 5`
  2. `gh run view <RUN_ID> --log-failed` → get error
  3. Fix the code with patch tool
  4. `git add . && git commit -m "fix: ..." && git push`
  5. `gh pr checks --watch`
  6. Repeat up to 3x, then alert user

  ### /pr merge
  Squash merge current PR:
  ```bash
  gh pr merge --squash --delete-branch
  # Or enable auto-merge (waits for CI):
  gh pr merge --auto --squash --delete-branch
  ```

  ### /pr list
  List open PRs:
  ```bash
  gh pr list --author @me
  gh pr list --state all
  ```

  ### /pr checkout [N]
  Check out someone's PR locally:
  ```bash
  gh pr checkout N
  ```

  ## WORKFLOW EXAMPLE
  ```bash
  # 1. Start
  git checkout main && git pull origin main
  git checkout -b fix/login-redirect

  # 2. Agent makes code changes

  # 3. Commit
  git add src/auth/login.py tests/test_login.py
  git commit -m "fix: preserve ?next= param after login"

  # 4. Push + PR
  git push -u origin HEAD
  gh pr create --title "fix: preserve redirect param" --body "## Summary\n..." --base main

  # 5. Monitor
  gh pr checks --watch

  # 6. Merge
  gh pr merge --squash --delete-branch
  ```

  ## CURL FALLBACK (no gh)
  ```bash
  REMOTE_URL=$(git remote get-url origin)
  OWNER_REPO=$(echo "$REMOTE_URL" | sed -E 's|.*github\.com[:/]||; s|\.git$||')
  OWNER=$(echo "$OWNER_REPO" | cut -d/ -f1)
  REPO=$(echo "$OWNER_REPO" | cut -d/ -f2)

  # Create PR
  curl -s -X POST \
    -H "Authorization: token $GITHUB_TOKEN" \
    -H "Accept: application/vnd.github.v3+json" \
    https://api.github.com/repos/$OWNER/$REPO/pulls \
    -d '{"title":"...","body":"...","head":"BRANCH","base":"main"}'
  ```
