name: skill-authoring
command: /newskill
description: Create, validate, and manage new cucumber-agent skills — template generator,
  YAML validator, best practices guide
args_hint: '[skill-name] — z.B. ''my-new-skill'' oder ''list'' zum Anzeigen aller
  Skills'
prompt: "Skill Authoring Skill — create, validate, and manage cucumber-agent skills.\n\
  \n## SKILL FORMAT (YAML)\n\nEvery skill is a YAML file in ~/.cucumber/skills/ with\
  \ this structure:\n\n```yaml\nname: skill-name            # lowercase, hyphens/underscores\
  \ only\ncommand: /slashcommand      # the /slash command to invoke\ndescription:\
  \ What it does  # one line, clear and concise\nargs_hint: \"[arg1] [arg2]\" # hint\
  \ for required arguments\nprompt: |\n  The full skill prompt — this is the main\
  \ content.\n  Written in second person (\"You are...\") or imperative (\"Create\
  \ a...\").\n\n  Include:\n  - What the skill does\n  - What tools are available\n\
  \  - Step-by-step instructions\n  - Examples\n  - Edge cases and pitfalls\n  - Output\
  \ format\n```\n\n## TEMPLATE GENERATOR\n\nWhen user asks to create a skill:\n1.\
  \ Ask for: name, command, description, and what it should do\n2. Generate the YAML\
  \ skeleton\n3. Fill in a detailed, actionable prompt section\n4. Save to ~/.cucumber/skills/NAME.yaml\n\
  5. Validate it loads correctly\n\n## VALIDATOR\n\nChecklist for any skill YAML:\n\
  - [ ] Valid YAML syntax (parseable)\n- [ ] `name` is lowercase, no spaces\n- [ ]\
  \ `command` starts with /\n- [ ] `description` is present and concise\n- [ ] `prompt`\
  \ is present and has actionable content\n- [ ] prompt includes step-by-step instructions\n\
  - [ ] prompt includes edge cases / error handling\n- [ ] file saved to ~/.cucumber/skills/*.yaml\n\
  \nTo validate: run through skill loader logic mentally:\n```python\nimport yaml\n\
  with open(\"~/.cucumber/skills/NAME.yaml\") as f:\n    data = yaml.safe_load(f)\n\
  assert \"name\" in data\nassert \"command\" in data\nassert data[\"command\"].startswith(\"\
  /\")\nassert \"prompt\" in data and len(data[\"prompt\"]) > 50\n```\n\n## SKILL\
  \ AUTHORING WORKFLOW\n\n1. **Gather requirements** — ask user:\n   - What's the\
  \ skill called? (name, command)\n   - What should it do?\n   - What inputs does\
  \ it need?\n   - What outputs does it produce?\n   - What edge cases exist?\n\n\
  2. **Generate skill**\n   - Write the YAML\n   - Make the prompt specific, not generic\n\
  \   - Include real commands, not just descriptions\n   - Add examples\n\n3. **Save**\n\
  \   - Write to ~/.cucumber/skills/NAME.yaml\n   - Use heredoc or write_file tool\n\
  \n4. **Validate**\n   - Parse YAML to check syntax\n   - Verify structure\n   -\
  \ Optionally: test by asking \"what would this skill do for X?\"\n\n5. **Document**\
  \ — add to skill description if complex\n\n## BEST PRACTICES\n\n### GOOD prompt\
  \ example:\n```\nprompt: |\n  Create a calendar event in Apple Calendar.\n\n  Parse\
  \ the user's input: {args}\n  Extract: event name, date, and time.\n\n  Use the\
  \ shell tool to execute this AppleScript (fill in the extracted values):\n  osascript\
  \ -e 'tell application \"Calendar\"\n    tell calendar \"Home\"\n      make new\
  \ event with properties {summary:\"EVENT_NAME\", start date:DATE}\n    end tell\n\
  \  end tell'\n\n  If no specific time is given, use 09:00 as start time.\n  Execute\
  \ and confirm to user.\n```\n\n### BAD prompt example:\n```\nprompt: \"This skill\
  \ creates calendar events.\"\n```\n\nRules:\n- Be specific about commands to run\n\
  - Include error handling\n- Show example inputs/outputs\n- Keep it actionable —\
  \ the agent should know exactly what to do\n- Use second person (\"You are...\"\
  ) or imperative (\"Do X, then Y...\")\n\n## MANAGING SKILLS\n\n**List all skills:**\n\
  ```bash\nls ~/.cucumber/skills/\n```\n\n**Show skill content:**\nRead ~/.cucumber/skills/NAME.yaml\n\
  \n**Delete skill:**\nrm ~/.cucumber/skills/NAME.yaml\n\n**Edit skill:**\npatch ~/.cucumber/skills/NAME.yaml\n\
  \n**Duplicate/copy skill:**\ncp ~/.cucumber/skills/SOURCE.yaml ~/.cucumber/skills/TARGET.yaml\n\
  \n## SPECIAL FIELDS\n\n`trigger:` (optional) — keywords that auto-suggest this skill\n\
  ```yaml\ntriggers: [calendar, event, termin]\n```\n\n`category:` (optional) — organize\
  \ skills\n```yaml\ncategory: productivity\n```\n\n`examples:` (optional) — usage\
  \ examples\n```yaml\nexamples:\n  - \"/calendar Meeting morgen um 14:00\"\n  - \"\
  /calendar Arzttermin 15.05.2026 10:00\"\n```\n\n## VALIDATION COMMAND\n\nRun this\
  \ to validate a skill file:\n```bash\npython3 -c \"\nimport yaml, sys\npath = sys.argv[1]\n\
  with open(path) as f:\n    data = yaml.safe_load(f)\nerrors = []\nif not data.get('name'):\
  \ errors.append('missing name')\nif not data.get('command'): errors.append('missing\
  \ command')\nif not data.get('command', '').startswith('/'): errors.append('command\
  \ must start with /')\nif not data.get('prompt'): errors.append('missing prompt')\n\
  if len(data.get('prompt', '')) < 50: errors.append('prompt too short')\nif errors:\n\
  \    print('ERRORS:', ', '.join(errors))\n    sys.exit(1)\nprint('OK:', data['name'])\n\
  \"\n~/.cucumber/skills/SKILL.yaml\n```\n"
triggers:
- skill erstellen
- new skill
- create skill
- skill schreiben
- yaml skill
- skill bauen
- slash command
- eigener skill
- skill yaml
- skill format
- skill struktur
