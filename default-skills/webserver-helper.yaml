name: webserver-helper
command: /webserver
description: Nginx and Apache — config syntax check, logs, reverse proxy, SSL, .htaccess
args_hint: '[server] [action] — z.B. ''nginx configtest'' oder ''apache logs error'''
prompt: "Webserver Helper — Nginx and Apache configuration and management.\n\n## NGINX\n\
  \n```bash\n# Config test (always run before reload)\nsudo nginx -t\nnginx -t -c\
  \ /path/to/nginx.conf\n\n# Reload / restart\nsudo nginx -s reload\nsudo systemctl\
  \ reload nginx\nsudo systemctl restart nginx\n\n# Status / modules\nnginx -v\nnginx\
  \ -V                       # compile flags + modules\n\n# Config locations\n# Debian/Ubuntu:\n\
  /etc/nginx/nginx.conf\n/etc/nginx/sites-available/\n/etc/nginx/sites-enabled/\n\
  /etc/nginx/conf.d/\n\n# RHEL/Fedora:\n/etc/nginx/nginx.conf\n/etc/nginx/conf.d/\n\
  \n# Logs\ntail -f /var/log/nginx/access.log\ntail -f /var/log/nginx/error.log\n\n\
  # Common directives (config snippets):\n# reverse proxy:\nlocation / {\n  proxy_pass\
  \ http://127.0.0.1:3000;\n  proxy_set_header Host $host;\n  proxy_set_header X-Real-IP\
  \ $remote_addr;\n  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n\
  }\n\n# static files:\nlocation /static/ {\n  alias /var/www/app/static/;\n  expires\
  \ 30d;\n}\n\n# SSL redirect:\nreturn 301 https://$host$request_uri;\n```\n\n## APACHE\n\
  \n```bash\n# Config test\nsudo apache2ctl configtest\nhttpd -t\n\n# Reload / restart\n\
  sudo systemctl reload apache2\nsudo systemctl restart apache2\n\n# Status / modules\n\
  apache2 -v\napache2ctl -M                   # loaded modules\n\n# Config locations\
  \ (Debian/Ubuntu)\n/etc/apache2/apache2.conf\n/etc/apache2/sites-available/\n/etc/apache2/sites-enabled/\n\
  /etc/apache2/conf-available/\n/etc/apache2/mods-available/\n\n# RHEL/Fedora:\n/etc/httpd/conf/httpd.conf\n\
  /etc/httpd/conf.d/\n\n# Logs\ntail -f /var/log/apache2/access.log\ntail -f /var/log/apache2/error.log\n\
  \n# .htaccess (per-directory config)\n# Enable .htaccess:\nAllowOverride All   \
  \  # in <Directory> block\n\n# Common .htaccess:\n# RewriteEngine On\n# RewriteCond\
  \ %{HTTPS} off\n# RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]\n\
  ```\n\n## SSL / TLS\n\n```bash\n# Let's Encrypt (certbot)\nsudo certbot --nginx\
  \ -d example.com\nsudo certbot renew --dry-run\nsudo certbot renew\n\n# Self-signed\
  \ (testing only!)\nopenssl req -x509 -nodes -days 365 -newkey rsa:2048 \\\n  -keyout\
  \ /etc/ssl/private/nginx.key \\\n  -out /etc/ssl/certs/nginx.crt\n\n# Check SSL\
  \ certificate\nopenssl s_client -connect example.com:443\nopenssl s_client -connect\
  \ example.com:443 -servername example.com\n\n# Test SSL config\nssllabs.com/ssltest/\
  \   # online tool\n```\n\n## PHP-FPM (common with nginx/apache)\n\n```bash\n# Config\
  \ test\nphp-fpm -t\n\n# Restart\nsudo systemctl restart php-fpm\nsudo systemctl\
  \ restart phpX.X-fpm\n\n# Check socket\nls /run/php/\n```\n\n## COMPARISON\n\n|\
  \ Task | Nginx | Apache |\n|------|-------|--------|\n| Config test | `nginx -t`\
  \ | `apache2ctl configtest` |\n| Reload | `nginx -s reload` | `systemctl reload\
  \ apache2` |\n| Restart | `systemctl restart nginx` | `systemctl restart apache2`\
  \ |\n| Modules | `nginx -V` | `apache2ctl -M` |\n| Logs | `/var/log/nginx/` | `/var/log/apache2/`\
  \ |\n"
triggers:
- nginx
- apache
- web server
- reverse proxy
- ssl
- https
- lets encrypt
- certbot
- http server
- virtual host
- nginx config
- apache config
- htaccess
- load balancer
- domain
- vhost
