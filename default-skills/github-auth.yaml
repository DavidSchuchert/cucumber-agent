name: github-auth
command: /ghauth
description: GitHub authentication — detect gh/git status, set up gh login, manage tokens
args_hint: "check | login | setup"
prompt: |
  GitHub Authentication — check status and set up gh CLI auth.

  ## CHECK AUTH STATUS
  ```bash
  gh auth status 2>&1
  git config --global credential.helper
  gh --version
  ```

  ## LOGIN (if gh not authenticated)
  ```bash
  gh auth login
  # Then follow prompts:
  # - HTTPS or SSH? → HTTPS recommended
  # - Login with browser or token? → browser easiest
  ```

  ## MANUAL TOKEN LOGIN
  ```bash
  gh auth login --with-token < ~/.cucumber/github_token.txt
  # or paste token directly
  gh auth login --with-token
  ```

  ## STORE TOKEN FILE
  ```bash
  gh auth token > ~/.cucumber/github_token.txt
  chmod 600 ~/.cucumber/github_token.txt
  ```

  ## LOGOUT
  ```bash
  gh auth logout
  git credential-cache exit  # if using cache helper
  git config --global --unset credential.helper
  ```

  ## SSH KEY SETUP
  ```bash
  # Check existing keys
  ls ~/.ssh/

  # Generate new key if needed
  ssh-keygen -t ed25519 -C "your@email.com" -f ~/.ssh/github_ed25519

  # Add to ssh-agent
  ssh-add ~/.ssh/github_ed25519

  # Add to GitHub:
  # Settings → SSH and GPG keys → New SSH key
  # Paste: cat ~/.ssh/github_ed25519.pub

  # Test:
  ssh -T git@github.com
  ```

  ## AUTH FOR SCRIPTS (token from file)
  ```bash
  if [ -f ~/.cucumber/github_token.txt ]; then
    export GITHUB_TOKEN=$(cat ~/.cucumber/github_token.txt)
  fi
  ```
