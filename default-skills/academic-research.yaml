name: academic-research
command: /research
description: Academic research — PubMed, arXiv, Google Scholar, PDF download, DOI
  lookup, BibTeX export, RSS tracking
args_hint: '[Topic/Author/DOI] — z.B. ''machine learning transformer'' oder ''10.1038/nature12373'''
prompt: "Academic Research Skill — comprehensive literature search and paper retrieval.\n\
  \n## Your tools\n- web_search (DuckDuckGo) for all searches\n- terminal/curl for\
  \ API calls (PubMed E-utilities, arXiv API, Google Scholar scraping)\n- browser_navigate\
  \ for PDF downloads and complex pages\n\n## Workflow\n\n### 1. IDENTIFY SOURCE TYPE\n\
  Parse the input to determine what we're looking for:\n- DOI pattern (10.xxxxx/...)\
  \ → DOI lookup first, then search\n- Topic/keyword → Multi-source search\n- Author\
  \ name → Author search on each platform\n- arXiv ID (2301.00001) → Direct arXiv\
  \ fetch\n- PubMed ID (12345678) → Direct PubMed fetch\n\n### 2. SEARCH STRATEGY\
  \ (multi-source)\nRun these searches in parallel where possible:\n\n**PubMed (E-utilities\
  \ API):**\n```bash\n# Search\ncurl -s \"https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=TOPIC&retmax=20&retmode=json\"\
  \n# Fetch details (after getting IDs)\ncurl -s \"https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=ID1,ID2&retmode=json\"\
  \n```\n\n**arXiv (Atom feed):**\n```bash\n# Search by topic\ncurl -s \"https://export.arxiv.org/api/query?search_query=all:TOPIC&start=0&max_results=20&sortBy=relevance\"\
  \n# Search by author\ncurl -s \"https://export.arxiv.org/api/query?search_query=au:AUTHOR_NAME&start=0&max_results=20\"\
  \n```\n\n**Google Scholar (DuckDuckGo):**\n```\nweb_search: \"TOPIC site:scholar.google.com\
  \ OR site:arxiv.org OR site:pubmed.ncbi.nlm.nih.gov\"\n```\n\n### 3. FETCH FULL\
  \ PAPERS / PDFs\nFor promising results:\n- Check if open-access (arXiv has free\
  \ PDFs)\n- arXiv PDF: https://arxiv.org/pdf/ID.pdf\n- PubMed: use the \"Free full\
  \ text\" link or request via NCBI E-utilities esummary\n- Try to find DOI and resolve\
  \ to publisher page\n- If PDF found, offer to download to ~/Downloads/papers/\n\n\
  ### 4. DOI LOOKUP\n```bash\n# Direct DOI resolution\ncurl -sL \"https://doi.org/DOI\"\
  \ -o /dev/null -w \"%{http_code} %{redirect_url}\"\n# BibTeX from CrossRef\ncurl\
  \ -s \"https://api.crossref.org/works/DOI\" | jq '{title, author, DOI, container-title,\
  \ published}'\n```\n\n### 5. BIBTEX EXPORT\nFor each paper, generate BibTeX entry:\n\
  ```bash\ncurl -s \"https://api.crossref.org/works/DOI\" | jq -r '.message' > bib.json\n\
  # Then format as BibTeX manually:\n# @article{key,\n#   title={...},\n#   author={...},\n\
  #   journal={...},\n#   year={...},\n#   doi={...}\n# }\n```\n\n### 6. RSS/TRACKING\
  \ FOR TOPICS\nFor tracking, generate RSS feed URLs:\n- arXiv: https://export.arxiv.org/api/query?search_query=all:TOPIC&sortBy=submittedDate\n\
  - PubMed: https://pubmed.ncbi.nlm.nih.gov/?term=TOPIC&filter=recent10\n- Google\
  \ Scholar Alerts: provide DuckDuckGo search link\n\nStore tracked topics in ~/.cucumber/memory/academic-topics.md:\n\
  ```\n# Tracked Research Topics\n## Topic: [name]\n- arXiv feed: URL\n- PubMed link:\
  \ URL\n- Last checked: YYYY-MM-DD\n- Recent papers: ...\n```\n\n## OUTPUT FORMAT\n\
  Present results in structured format:\n```\n## [Platform] Results for \"QUERY\"\n\
  1. **Title** — Authors (Year)\n   - DOI/ID: ...\n   - Abstract: ...\n   - Link:\
  \ ...\n   - [PDF] [BibTeX] [Save]\n```\n\n## QUALITY CHECKS\n- Always verify paper\
  \ exists before claiming \"found\"\n- Note if PDF is behind paywall\n- Sort by relevance,\
  \ then by date\n- Deduplicate across sources\n- Check publication date for recency\
  \ requirements\n"
triggers:
- pubmed
- arxiv
- doi
- paper
- research
- academic
- literatur
- studie
- wissenschaft
- forschung
- biorxiv
- scholar
- citation
- bibtex
- zitation
- publikation
- doi lookup
- paper herunterladen
- literaturrecherche
